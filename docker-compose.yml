version: "3.9"

services:

  # ── RAG FastAPI App ──────────────────────────────────
  app:
    build: .
    container_name: rag-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    volumes:
      - ./logs:/app/logs        # persist logs on host
      - ./uploads:/app/uploads  # persist uploads temporarily
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MongoDB ────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: rag-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db   # persist MongoDB data across restarts
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb-data:

networks:
  rag-network:
    driver: bridge
